# ============================================================
# Datasource — Neon PostgreSQL (set env vars in prod)
# ============================================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/exam_scheduler}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Seed data
# ============================================================
spring.sql.init.mode=never

# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# CORS — override in production with actual Vercel/Netlify URL
# ============================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
